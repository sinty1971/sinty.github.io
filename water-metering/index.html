<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Metering | metric-labs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #007bff; --bg-light: #f4f7f6; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-meter { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .weight-display { font-size: 5rem; font-weight: 800; color: var(--primary-blue); letter-spacing: -2px; }
        .unit { font-size: 1.5rem; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h2 class="fw-light text-secondary mb-0">metric-labs</h2>
            <h1 class="fw-bold">Water Auto-Metering</h1>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card card-meter p-4 text-center bg-white">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="badge rounded-pill bg-light text-dark border" id="connStatus">Disconnected</span>
                        <div id="batteryLevel" class="small text-muted"></div>
                    </div>

                    <div class="py-4">
                        <div class="weight-display" id="valDisplay">0.00</div>
                        <div class="unit">Kilograms (kg)</div>
                    </div>

                    <div class="mt-4 d-grid gap-3">
                        <button class="btn btn-primary btn-lg py-3 rounded-pill" id="btnConnect">Connect via Bluetooth</button>
                        <button class="btn btn-outline-danger py-2 rounded-pill" id="btnDisconnect" style="display:none">Disconnect</button>
                        <div class="row g-2">
                            <div class="col-6">
                                <button class="btn btn-outline-secondary py-2 rounded-pill w-100" id="btnZero" disabled>Zero (Z)</button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-secondary py-2 rounded-pill w-100" id="btnTare" disabled>Tare (T)</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <p class="text-center mt-4 text-muted small">
                    &copy; 2026 metric-labs project. All rights reserved.
                </p>
            </div>
        </div>
    </div>

    <script>
        // ESP32側のNimBLE設定に合わせて調整
//        const UUID_SERVICE = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
//        const UUID_WEIGHT  = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
//        const UUID_COMMAND = 'd1159495-2c81-4328-8686-e26a4c2a4915';

        // gatt_svc.c の NUS (Nordic UART Service) に対応
        const UUID_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';  // NUS Service
        const UUID_WEIGHT  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';  // NUS TX: デバイス→ブラウザ (Notify)
        const UUID_COMMAND = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';  // NUS RX: ブラウザ→デバイス (Write)

        let bleDevice       = null;
        let bleCharCommand  = null;
        let reconnectTimer  = null;
        let keepaliveTimer  = null;
        let wakeLock        = null;

        /* Screen Wake Lock: スクリーンオフによる BLE スロットルを防ぐ */
        async function acquireWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => { wakeLock = null; });
            } catch (e) {
                console.warn('Wake Lock denied:', e);
            }
        }

        function releaseWakeLock() {
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
        }

        /*
         * Page Visibility: タブをフォアグラウンドに戻したとき
         * Wake Lock の再取得 + 切断中なら自動再接続をトリガー
         */
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState !== 'visible') return;
            if (wakeLock === null && bleDevice) await acquireWakeLock();
            if (bleDevice && !bleDevice.gatt.connected) onDisconnected();
        });

        async function connectToDevice(device) {
            const server  = await device.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);

            const charWeight = await service.getCharacteristic(UUID_WEIGHT);
            await charWeight.startNotifications();
            charWeight.oncharacteristicvaluechanged = (e) => {
                const str   = new TextDecoder().decode(e.target.value);
                const match = str.match(/[+|\-]?\d+\.\d+/);
                if (match) document.getElementById('valDisplay').innerText = match[0];
            };

            bleCharCommand = await service.getCharacteristic(UUID_COMMAND);
            await acquireWakeLock();

            /*
             * JS側 keepalive: writeValueWithResponse() で 2 秒ごと書き込む。
             * Central (Chrome/Windows) が ATT Write Request を送信し
             * ESP32 が Write Response を返すため、両側の
             * supervision timeout タイマーがリセットされる。
             */
            if (keepaliveTimer) clearInterval(keepaliveTimer);
            const keepalivePkt = new TextEncoder().encode('K\r\n');
            keepaliveTimer = setInterval(async () => {
                if (!bleCharCommand || !bleDevice?.gatt.connected) return;
                try {
                    await bleCharCommand.writeValueWithResponse(keepalivePkt);
                } catch (e) { /* 再接続中は無視 */ }
            }, 2000);

            updateUI('connected');
        }

        async function onDisconnected() {
            bleCharCommand = null;
            if (!bleDevice) return;
            updateUI('reconnecting');
            // 指数バックオフで再接続 (1s → 2s → 4s → 8s → 最大8s)
            let delay = 1000;
            while (bleDevice) {
                await new Promise(r => { reconnectTimer = setTimeout(r, delay); });
                try {
                    await connectToDevice(bleDevice);
                    return; // 再接続成功
                } catch (e) {
                    console.warn('Reconnect failed, retrying...', e);
                    delay = Math.min(delay * 2, 8000);
                }
            }
        }

        document.getElementById('btnConnect').onclick = async () => {
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'NimBLE_GATT' }],
                    optionalServices: [UUID_SERVICE]
                });
                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                await connectToDevice(bleDevice);
            } catch (err) {
                console.error(err);
                alert('Connection failed. Check if Bluetooth is enabled.');
            }
        };

        document.getElementById('btnDisconnect').onclick = () => {
            if (bleDevice) {
                bleDevice.removeEventListener('gattserverdisconnected', onDisconnected);
                if (bleDevice.gatt.connected) bleDevice.gatt.disconnect();
                bleDevice = null;
                bleCharCommand = null;
                clearTimeout(reconnectTimer);
                clearInterval(keepaliveTimer);
                keepaliveTimer = null;
                releaseWakeLock();
                updateUI('disconnected');
            }
        };

        function updateUI(state) {
            const status    = document.getElementById('connStatus');
            const btnConn   = document.getElementById('btnConnect');
            const btnDisc   = document.getElementById('btnDisconnect');
            if (state === 'connected') {
                status.innerText        = 'Connected';
                status.className        = 'badge rounded-pill bg-success';
                btnConn.style.display   = 'none';
                btnDisc.style.display   = 'block';
            } else if (state === 'reconnecting') {
                status.innerText        = 'Reconnecting...';
                status.className        = 'badge rounded-pill bg-warning text-dark';
                btnConn.style.display   = 'none';
                btnDisc.style.display   = 'block';
            } else {
                status.innerText        = 'Disconnected';
                status.className        = 'badge rounded-pill bg-light text-dark border';
                btnConn.style.display   = 'block';
                btnDisc.style.display   = 'none';
            }
            const ok = (state === 'connected');
            document.getElementById('btnZero').disabled = !ok;
            document.getElementById('btnTare').disabled = !ok;
        }

        async function send(cmd) {
            if (bleCharCommand) {
                await bleCharCommand.writeValue(new TextEncoder().encode(cmd + '\r\n'));
            }
        }

        document.getElementById('btnZero').onclick = () => send('Z');
        document.getElementById('btnTare').onclick = () => send('T');
    </script>
</body>
</html>
